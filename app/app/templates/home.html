<!DOCTYPE html>
<html lang="en">
  <head>
    <title>IDT Home</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        width: 100vw;
        background: #fff;
        font-family: "Segoe UI", Arial, sans-serif;
        box-sizing: border-box;
        overflow: hidden; /* Hide all scrollbars */
      }
      body {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        height: 100vh;
        width: 100vw;
      }
      .header {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        position: relative; /* Needed for absolute centering of Home */
        height: 1.5cm;
        min-height: 1.5cm;
        max-height: 1.5cm;
        padding: 0 24px;
        background: #fff;
        /* border-bottom: 3px solid #e2c94c; Gold line */
        box-sizing: border-box;
      }
      .idt-logo {
        height: 4.8cm; /* Largest possible that fits comfortably */
        max-height: 4.8cm;
        width: auto;
        margin: 0 18px 0 0;
        object-fit: contain;
        display: block;
      }
      .header-title {
        position: absolute;
        left: 35%; /* less than 50% = shifted slightly left */
        transform: translateX(-50%);
        font-size: 2.2rem; /* increase size as desired */
        font-weight: 500;
        color: #222;
        letter-spacing: 1.5px;
        white-space: nowrap;
        top: 50%;
        transform: translate(-50%, -50%); /* perfectly centered vertically */
      }

      .nav {
        display: flex;
        gap: 10px;
        align-items: center;
        margin-left: auto; /* Pushes nav icons to the far right */
        padding-right: 6px;
      }

      .nav-icon {
        height: 22px; /* Smaller icons */
        width: 22px;
        margin-left: 8px;
        cursor: pointer;
        object-fit: contain;
        transition: filter 0.13s;
      }
      .nav-icon:hover {
        filter: brightness(1.2) drop-shadow(0 0 3px #ffe37a99);
      }

      .main-flex {
        display: flex;
        flex: 1;
        width: 100vw;
        background: #fff;
      }
      .left-panel {
        flex: 0 0 290px;
        background: #fff;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        padding: 0 0 0 40px;
        margin-top: 30px;
        min-width: 220px;
        height: 100%;
      }
      .left-panel label {
        font-weight: 700;
        margin-bottom: 2px;
      }
      .left-panel input,
      .left-panel textarea {
        background: #fcf7df;
        border: 1px solid #ebdcaa;
        border-radius: 8px;
        padding: 8px 10px;
        width: 210px;
        font-size: 1rem;
        margin-bottom: 8px;
      }
      .left-panel textarea {
        min-height: 36px;
      }
      .range-block {
        display: flex;
        width: 98%;
        gap: 10px;
        align-items: center;
        margin-bottom: 10px;
      }
      .range-block input[type="range"] {
        flex: 1;
      }
      .range-block input[type="text"] {
        width: 52px;
        padding-left: 8px;
        border-radius: 6px;
        font-size: 1rem;
        font-weight: 500;
        border: 1px solid #ebdcaa;
        background: #fff;
      }
      input[type="range"] {
        appearance: none;
        -webkit-appearance: none;
        width: 100%;
        height: 8px;
        background: #ece2b6; /* Light gold for unfilled track */
        border-radius: 6px;
        outline: none;
        /* Remove default border in FF */
        border: none;
        /* For consistent behavior on different browsers */
        overflow: hidden;
      }

      /* Track fill to the left of the thumb - Webkit */
      input[type="range"]::-webkit-slider-runnable-track {
        height: 8px;
        background: linear-gradient(
          to right,
          #e2c94c var(--percent, 0%),
          #ece2b6 var(--percent, 0%)
        );
        border-radius: 6px;
      }
      input[type="range"]::-webkit-slider-thumb {
        appearance: none;
        width: 20px;
        height: 20px;
        background: #e2c94c; /* Gold thumb */
        border: 2px solid #b59b04;
        border-radius: 50%;
        cursor: pointer;
        margin-top: -6px; /* Center the thumb! */
        box-shadow: 0 0 1px #b59b04;
        transition: background 0.18s;
      }

      input[type="range"]:focus::-webkit-slider-thumb {
        background: #ceb82c;
      }

      /* Track fill to the left of the thumb - Firefox */
      input[type="range"]::-moz-range-thumb {
        background: #e2c94c;
        border: 2px solid #b59b04;
        border-radius: 50%;
        width: 20px;
        height: 20px;
        cursor: pointer;
        transition: background 0.18s;
      }
      input[type="range"]:focus::-moz-range-thumb {
        background: #ceb82c;
      }
      input[type="range"]::-moz-range-track {
        height: 8px;
        background: #ece2b6;
        border-radius: 6px;
      }
      input[type="range"]::-moz-range-progress {
        background-color: #e2c94c; /* Gold fill left of thumb */
        height: 8px;
        border-radius: 6px;
      }

      /* Track fill to the left of the thumb - IE */
      input[type="range"]::-ms-thumb {
        background: #e2c94c;
        border: 2px solid #b59b04;
        border-radius: 50%;
        width: 20px;
        height: 20px;
        cursor: pointer;
      }
      input[type="range"]:focus::-ms-thumb {
        background: #ceb82c;
      }
      input[type="range"]::-ms-fill-lower {
        background: #e2c94c;
        border-radius: 6px;
      }
      input[type="range"]::-ms-fill-upper {
        background: #ece2b6;
        border-radius: 6px;
      }

      input[type="range"]:focus {
        outline: none;
      }
      input[type="range"]::-moz-focus-outer {
        border: 0;
      }

      .auto-focus-btn {
        background: #e1be59;
        color: black;
        font-weight: bold;
        border-radius: 8px;
        border: none;
        padding: 8px 14px;
        font-size: 1rem;
        width: 120px;
        cursor: pointer;
        transition: background 0.14s;
        margin-top: 12px;
        margin-bottom: 6px;
      }
      .auto-focus-btn:hover {
        background: #c2a137;
      }
      /* MAIN/MIDDLE PANEL */
      .middle-panel {
        flex: 1;
        display: flex;
        flex-direction: column;
        padding: 0 45px 0 28px;
        margin-top: 22px;
        align-items: center;
        height: 100vh;
        min-width: 0;
      }
      .main-title {
        font-size: 1.25rem;
        font-weight: 700;
        margin: 0 0 9px 0;
        align-self: flex-start;
      }
      .camera-box {
        width: 96%;
        background: #fff;
        border: 2.5px solid #ecd47e;
        border-radius: 12px;
        margin-bottom: 28px;
        height: 360px;
        min-height: 190px;
        box-sizing: border-box;
        align-self: flex-start;
        position: relative;
        flex-shrink: 0;
      }
      .camera-box img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        border-radius: 10px;
        background: #fff;
        display: block;
      }
      .button-bar {
        width: 100%;
        display: flex;
        gap: 34px;
        justify-content: center;
        margin: 0 auto 22px auto;
        padding-top: 2px;
        flex-shrink: 0;
      }
      .panel-btn {
        display: flex;
        align-items: center;
        background: #f8e29d;
        color: black;
        border: 2.5px solid #e1be59;
        border-radius: 12px;
        font-size: 1.09rem;
        font-weight: 700;
        padding: 7px 16px; /* Less vertical & horizontal padding */
        gap: 10px;
        cursor: pointer;
        box-shadow: 0 2px 10px #e4c64b15;
        transition: background 0.12s;
        flex-shrink: 0;
      }
      .panel-btn:hover {
        background: #f2cc59;
      }
      .panel-btn img {
        height: 26px;
        width: 26px;
        margin-right: 8px;
      }
      .footer-bar {
        width: calc(
          100vw - 50px
        ); /* If your main left sidebar is 240px wide, match this! */
        margin: 0px 0 20px -310px; /* top, right, bottom, left; left is now 0 for no gap */
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: #fcf7df;
        color: #222;
        font-size: 1.2rem;
        font-weight: bold;
        border: 2.5px solid #e2c94c;
        border-radius: 13px;
        box-sizing: border-box;
        letter-spacing: 1px;
        box-shadow: 0 2px 8px #e2c94c18;
        font-family: "Segoe UI", Arial, sans-serif;
        height: 49px;
        position: static;
      }

      .footer-bar > span,
      .footer-bar > a {
        flex: 1;
        text-align: center;
        align-items: center;
        display: flex;
        justify-content: center;
        font-weight: 700;
        font-size: 1.08rem;
      }
      .footer-bar > a {
        text-decoration: none;
        color: #222;
        font-weight: bold;
        font-size: 1.08rem;
        justify-content: center;
      }
      /* .footer-bar::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 7px;
      bottom: 7px;
      width: 2px;
      background: #e2c94c;
      border-radius: 2px;
      z-index: 2;
      display: block;
    } */
      @media (max-width: 1050px) {
        .main-flex {
          flex-direction: column;
          width: 100%;
        }
        .left-panel,
        .middle-panel {
          width: 100%;
          min-width: 0;
          padding-left: 8px;
          padding-right: 8px;
          box-sizing: border-box;
        }
        .left-panel {
          align-items: stretch;
          padding-left: 8px;
          padding-right: 8px;
        }
        .camera-box {
          width: 100%;
          min-width: 0;
          height: 210px;
        }
        .button-bar {
          flex-wrap: wrap;
          gap: 18px;
        }
      }
      @media (max-width: 600px) {
        .header-title {
          font-size: 1.1rem;
          left: 50%;
        }
        .panel-btn {
          font-size: 0.95rem;
          padding: 5px 8px;
        }
        .camera-box {
          height: 120px;
        }
      }
    </style>
  </head>
  <body>
    <div class="header">
      <img
        class="idt-logo"
        src="{{ url_for('static', filename='IDT complete logo.png') }}"
      />
      <span class="header-title">Home</span>
      <div class="nav">
        <img
          src="{{ url_for('static', filename='support.png') }}"
          class="nav-icon"
          alt="Support"
          title="Support"
          onclick="toggleLight()"
        />
        <img
          src="{{ url_for('static', filename='back.png') }}"
          class="nav-icon"
          alt="Back"
          title="Back"
          onclick="goBack()"
        />
        <img
          src="{{ url_for('static', filename='power.png') }}"
          class="nav-icon"
          alt="Power"
          title="Power"
          onclick="powerOff()"
        />
      </div>
    </div>

    <div class="main-flex">
      <!-- Left panel -->
      <form class="left-panel">
        <label for="lot">Lot No:</label>
        <input type="text" id="lot" name="lot" autocomplete="off" />
        <label for="id">ID:</label>
        <input type="text" id="id" name="id" autocomplete="off" />
        <label for="size">Size:</label>
        <input type="text" id="size" name="size" autocomplete="off" />
        <label for="remark">Remark:</label>
        <textarea id="remark" name="remark" autocomplete="off"></textarea>
        <div class="range-block">
          <input type="range" min="0" max="1000" id="value_range" />
          <input type="text" value="000" />
        </div>
        <button type="button" class="auto-focus-btn" id="auto-focus-btn">
          Auto Focus
        </button>
      </form>
      <!-- Middle panel -->
      <div class="middle-panel">
        <div class="camera-box">
          <div
            id="scan-spinner-overlay"
            style="
              display: none;
              position: absolute;
              left: 0;
              top: 0;
              width: 100%;
              height: 100%;
              justify-content: center;
              align-items: center;
              z-index: 9;
            "
          >
             
            <div
              style="display: flex; flex-direction: column; align-items: center"
            >
                 
              <svg id="scan-spinner" width="90" height="90" viewBox="0 0 90 90">
                     
                <circle
                  cx="45"
                  cy="45"
                  r="38"
                  stroke="#e2c94c"
                  stroke-width="8"
                  fill="none"
                  opacity="0.17"
                />
                     
                <circle
                  id="scan-spinner-perc"
                  cx="45"
                  cy="45"
                  r="38"
                  stroke="#e2c94c"
                  stroke-width="8"
                  fill="none"
                  stroke-linecap="round"
                  stroke-dasharray="238"
                  stroke-dashoffset="238"
                  style="transition: stroke-dashoffset 0.27s"
                />
                   
              </svg>
                 
              <span
                id="scan-spinner-text"
                style="
                  margin-top: -35px;
                  font-weight: 600;
                  color: #b59b04;
                  font-size: 1.5rem;
                  position: absolute;
                "
              >
                      0%    
              </span>
               
            </div>
          </div>

          <img src="{{ url_for('main.video_feed') }}" alt="Live Camera" />
        </div>
        <div class="button-bar">
          <button class="panel-btn" onclick="startScan()">
            <img src="{{ url_for('static', filename='scan.png') }}" />Scan
          </button>
          <button class="panel-btn">
            <img src="{{ url_for('static', filename='compare.png') }}" />Compare
          </button>
          <button class="panel-btn">
            <img src="{{ url_for('static', filename='result.png') }}" />Result
          </button>
          <button class="panel-btn">
            <img src="{{ url_for('static', filename='history.png') }}" />History
          </button>
          <button class="panel-btn">
            <img
              src="{{ url_for('static', filename='certificate.png') }}"
            />Certificate
          </button>
        </div>
        <div class="footer-bar">
          <span>IDT Gemological Laboratories Worldwide</span>
          <a href="https://www.idtworldwide.com" target="_blank"
            >www.idtworldwide.com</a
          >
        </div>
      </div>
    </div>
    <script>
      function toggleLight() {
        alert("Support");
      }
      function goBack() {
        window.history.back();
      }
      function powerOff() {
        alert("System powering off (demo)");
      }
    </script>

    <script>
      // Scan logic triggered from the main Scan button
      function startScan() {
        const lot = document.getElementById("lot").value;
        const prod_id = document.getElementById("id").value;
        const size = document.getElementById("size").value;
        const remark = document.getElementById("remark").value;
        const spinnerOverlay = document.getElementById("scan-spinner-overlay");
        const spinnerArc = document.getElementById("scan-spinner-perc");
        const spinnerText = document.getElementById("scan-spinner-text"); // Show spinner in camera

        spinnerOverlay.style.display = "flex";
        spinnerArc.setAttribute("stroke-dashoffset", 238);
        spinnerText.innerText = "0%"; // Animate fake progress (replace with server status for true tracking)

        let percent = 0;
        let scanInterval = setInterval(() => {
          percent += 4 + Math.random() * 6;
          if (percent > 100) percent = 100;
          spinnerArc.setAttribute(
            "stroke-dashoffset",
            238 - (238 * percent) / 100
          );
          spinnerText.innerText = Math.round(percent) + "%";
          if (percent >= 100) clearInterval(scanInterval);
        }, 220); // Kick off scan

        fetch("/scan", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            lot: lot,
            id: prod_id,
            size: size,
            remark: remark,
          }),
        })
          .then((response) => response.json())
          .then((data) => {
            clearInterval(scanInterval);
            spinnerArc.setAttribute("stroke-dashoffset", 0);
            spinnerText.innerText = "100%";
            setTimeout(() => {
              spinnerOverlay.style.display = "none";
            }, 1000);
          });
      }

      document.getElementById("auto-focus-btn").onclick = function () {
        fetch("/autofocus", { method: "POST" });
        // .then((res) => res.json())
        // .then((data) => alert(data.message));
      };
    </script>
    <script>
      document
        .querySelectorAll('input[type="range"]')
        .forEach(function (slider) {
          function updateTrack() {
            var val =
              ((slider.value - slider.min) / (slider.max - slider.min)) * 100;
            slider.style.setProperty("--percent", val + "%");
          }
          slider.addEventListener("input", updateTrack);
          updateTrack();
        });
    </script>
  </body>
</html>
